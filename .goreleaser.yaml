# .goreleaser.yaml
# See https://goreleaser.com for documentation

version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/keychain-auth
    binary: keychain-auth
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .Binary }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}{{ with .Mips }}_{{ . }}{{ end }}{{ if .Replacements }}{{ index .Replacements .Os }}{{ end }}"
    files:
      - README.md
      - LICENSE
      - init/*

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - name: keychain-auth
    repository:
      owner: The-17
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://agentsecrets.theseventeen.co"
    description: "Security policy daemon for AgentSecrets"
    license: "MIT"
    test: |
      system "#{bin}/keychain-auth --version"
    install: |
      bin.install "keychain-auth"
      # Install service files
      if OS.mac?
        (prefix/"io.keychainauth.daemon.plist").install "init/io.keychainauth.daemon.plist"
      elsif OS.linux?
        (prefix/"keychain-auth.service").install "init/keychain-auth.service"
      end
