# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: linux
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    main: ./cmd/keychain-auth
    binary: keychain-auth
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

  - id: darwin
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/keychain-auth
    binary: keychain-auth
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    # Standard GoReleaser v2 naming template
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ with .Arm }}v{{ . }}{{ end }}"
    files:
      - README.md
      - LICENSE
      - init/*

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

brews:
  - name: keychain-auth
    repository:
      owner: The-17
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://agentsecrets.theseventeen.co"
    description: "Security policy daemon for AgentSecrets"
    license: "MIT"
    test: |
      system "#{bin}/keychain-auth --version"
    install: |
      bin.install "keychain-auth"
      if OS.mac?
        (prefix/"io.keychainauth.daemon.plist").install "init/io.keychainauth.daemon.plist"
      elsif OS.linux?
        (prefix/"keychain-auth.service").install "init/keychain-auth.service"
      end
